// Time check
function isWithinTime(start, end) {
    const now = new Date();
    const current = now.getHours() * 60 + now.getMinutes();

    const [sh, sm] = start.split(":").map(Number);
    const [eh, em] = end.split(":").map(Number);

    const startTime = sh * 60 + sm;
    const endTime = eh * 60 + em;

    return current >= startTime && current <= endTime;
}



// Start attendance
function startAttendance(id, subject, faculty) {

    selectedLecture = {
        id: id,
        subject: subject,
        faculty: faculty
    };

    document.getElementById("lectureTitle").innerText = subject;

    document.getElementById("cameraSection").style.display = "block";

    startCamera();

}

// Camera
const video = document.getElementById('video');

function startCamera() {
    navigator.mediaDevices.getUserMedia({ video: true })
        .then(stream => video.srcObject = stream)
        .catch(() => alert("Camera access denied!"));
}

// Dummy capture
async function capture() {

    const canvas = document.createElement("canvas");

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    const ctx = canvas.getContext("2d");

    ctx.drawImage(video, 0, 0);

    canvas.toBlob(async function(blob){

        const formData = new FormData();

        formData.append("image", blob, "capture.jpg");

        const res = await fetch(
            "http://localhost:5000/api/recognize",
            {
                method: "POST",
                body: formData
            }
        );

        const data = await res.json();

        if(data.success){
            detectedStudent = data;
            document.getElementById("result").innerText =
                "Detected: " + data.name;

        }else{
            detectedStudent = {};
            document.getElementById("result").innerText =
                data.message;

        }

    }, "image/jpeg");

}



// Submit attendance

    if (!detectedStudent.roll) {
        alert("Please capture the student's face first.");
        return;
    }

            "Content-Type": "application/json"

        body: JSON.stringify({

            roll: detectedStudent.roll,
            name: detectedStudent.name,

async function loadLectures() {

    const container = document.getElementById("lectureContainer");

    container.innerHTML = "";

    const res = await fetch("http://localhost:5000/api/todays_lectures");

    const lectures = await res.json();

    lectures.forEach((lecture) => {

        container.innerHTML += `
            <div class="lecture-card">

                <h3>${lecture.subject}</h3>

                <p>
                    Time:

                </p>

                <p>
                    Faculty:
                    ${lecture.faculty}
                </p>

                <button
                    onclick="startAttendance(
                        ${lecture.id},
                        '${lecture.subject}',
                        '${lecture.faculty}'
                    )">

            </div>
        `;

    });

}

window.onload = function(){
