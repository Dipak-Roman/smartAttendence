<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2>Attendance</h2>
    <ul>
        <li onclick="goToDashboard()">🏠 Dashboard</li>
        <li onclick="goToLecture()">📷 Lecture</li>
        <li onclick="goToReport()">📊 Reports</li>
        <li onclick="goToSchedule()">📅 Schedule</li>
        <li onclick="logout()">🚪 Logout</li>
    </ul>
</div>

<!-- Main Content -->
<div class="main">

    <div class="header">
        <h1>Dashboard</h1>
        <p>Welcome back, Admin 👋</p>
    </div>

    <div class="cards">

        <div class="card">
            <h3>👨‍🎓 Total Students</h3>
            <p>120</p>
        </div>

        <div class="card">
            <h3>✅ Present Today</h3>
            <p>85</p>
        </div>

        <div class="card">
            <h3>❌ Absent Today</h3>
            <p>35</p>
        </div>

    </div>

    <div class="actions">
        <button onclick="goToAttendance()">Start Attendance</button>
        <button onclick="goToReport()">View Reports</button>
    </div>

</div>

<script>
function goToDashboard() {
    location.reload();
}

function goToLecture() {
    window.location.href = "lecture.html";
}

function goToReport() {
    window.location.href = "report.html";
}

function goToSchedule() {
    window.location.href = "schedule.html";
}

function logout() {
    window.location.href = "../login.html";
}
</script>

</body>
</html>
