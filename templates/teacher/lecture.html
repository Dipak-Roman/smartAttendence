<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lecture Schedule</title>
    <link rel="stylesheet" href="lecture.css">
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2>Teacher Panel</h2>
    <ul>
        <li onclick="goToDashboard()">🏠 Dashboard</li>
        <li onclick="goToLecture()">📷 Lecture</li>
        <li onclick="goToReport()">📊 Reports</li>
        <li onclick="goToSchedule()">📅 Schedule</li>
        <li onclick="logout()">🚪 Logout</li>
    </ul>
</div>

<!-- Main -->
<div class="main">

    <!-- Header -->
    <div class="header">
        <h1>Lecture Schedule</h1>
        <p>Manage your lectures easily</p>
    </div>

    <!-- Summary Cards (like dashboard) -->
    <div class="cards">
        <div class="card">
            <h3>Total Lectures</h3>
            <p id="totalLectures">0</p>
        </div>

        <div class="card">
            <h3>Today's Lectures</h3>
            <p id="todayLectures">0</p>
        </div>
    </div>

    <!-- Add Lecture Card -->
    <div class="card" style="margin-top:30px; text-align:left;">
        <h3>Add New Lecture</h3>

        <input type="text" id="subject" placeholder="Subject Name">
        <input type="text" id="faculty" placeholder="Faculty Name">
        <input type="time" id="startTime">
        <input type="time" id="endTime">

        <button onclick="addLecture()">Add Lecture</button>
    </div>

    <!-- Lecture List Card -->
    <div class="card" style="margin-top:30px;">
        <h3>Lecture List</h3>

        <table id="scheduleTable">
            <thead>
                <tr>
                    <th>Subject</th>
                    <th>Faculty</th>
                    <th>Time</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

</div>

<script>
function goToDashboard() {
    window.location.href = "dashboard.html";
}

function goToLecture() {
    location.reload();
}

function goToReport() {
    window.location.href = "report.html";
}

function goToSchedule() {
    window.location.href = "schedule.html";
}

function logout() {
    window.location.href = "../login.html";
}

// Data
let lectures = [];

// Add lecture
function addLecture() {
    const subject = document.getElementById("subject").value;
    const faculty = document.getElementById("faculty").value;
    const start = document.getElementById("startTime").value;
    const end = document.getElementById("endTime").value;

    if(subject === "" || faculty === "" || start === "" || end === "") {
        alert("Fill all fields!");
        return;
    }

    lectures.push({ subject, faculty, start, end });

    updateDashboard();
    displayLectures();
}

// Display
function displayLectures() {
    const tbody = document.querySelector("#scheduleTable tbody");
    tbody.innerHTML = "";

    lectures.forEach((lec, index) => {
        const row = `<tr>
            <td>${lec.subject}</td>
            <td>${lec.faculty}</td>
            <td>${lec.start} - ${lec.end}</td>
            <td><button onclick="deleteLecture(${index})">Delete</button></td>
        </tr>`;
        tbody.innerHTML += row;
    });
}

// Delete
function deleteLecture(index) {
    lectures.splice(index, 1);
    updateDashboard();
    displayLectures();
}

// Update cards
function updateDashboard() {
    document.getElementById("totalLectures").innerText = lectures.length;
    document.getElementById("todayLectures").innerText = lectures.length;
}
</script>

</body>
</html>
